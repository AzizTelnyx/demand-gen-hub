<!DOCTYPE html><html><head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* PP Formula Extrabold fallback to Inter Black */
  @font-face {
    font-family: 'PP Formula';
    font-weight: 800;
    font-style: normal;
    src: local('Inter Black'), local('Inter-Black');
  }

  body {
    width: 1200px;
    height: 627px;
    background: linear-gradient(135deg, #000000 0%, #1a0a1f 100%);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: white;
    overflow: hidden;
    position: relative;
  }

  /* Pink tint overlay for Voice AI */
  .color-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg,
      #FAE5FF15 0%,
      #E57EFF08 50%,
      transparent 100%);
    z-index: 0;
  }

  /* Background pattern */
  .bg-pattern {
    position: absolute;
    top: 0;
    right: 0;
    width: 60%;
    height: 100%;
    opacity: 0.05;
    z-index: 1;
  }

  /* Content layout */
  .content {
    position: relative;
    z-index: 2;
    display: flex;
    height: 100%;
    padding: 60px;
    align-items: center;
    gap: 60px;
  }

  .left {
    flex: 0 0 50%;
    display: flex;
    flex-direction: column;
    gap: 30px;
  }

  .right {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    
  }

  /* Pillar badge */
  .pillar-badge {
    display: inline-block;
    background: #E57EFF20;
    border: 1.5px solid #E57EFF;
    color: #E57EFF;
    font-size: 10px;
    font-weight: 800;
    padding: 8px 18px;
    border-radius: 20px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    align-self: flex-start;
  }

  /* Headline - PP Formula Extrabold */
  .headline {
    font-family: 'PP Formula', 'Inter', sans-serif;
    font-size: 48px;
    font-weight: 900;
    line-height: 1.1;
    letter-spacing: -1.5px;
    color: #FFFFFF;
    margin-top: 18px;
  }

  /* Description */
  .description {
    font-size: 17px;
    line-height: 1.6;
    color: #8892a6;
    max-width: 90%;
    font-weight: 400;
  }

  /* CTA Button - ALL CAPS with headline font */
  .cta-button {
    display: inline-block;
    background: #E57EFF;
    color: #000000;
    padding: 16px 32px;
    border-radius: 8px;
    font-family: 'PP Formula', 'Inter', sans-serif;
    font-weight: 900;
    font-size: 14px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 24px;
    align-self: flex-start;
    box-shadow: 0 4px 20px #E57EFF40;
  }

  /* Product screenshot */
  .product-visual {
    max-width: 100%;
    max-height: 407.55px;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }

  /* Logo - LARGER SIZE */
  .logo-bottom {
    position: absolute;
    bottom: 60px;
    left: 60px;
    height: 28px;
    opacity: 0.95;
    z-index: 10;
  }
</style></head><body>
