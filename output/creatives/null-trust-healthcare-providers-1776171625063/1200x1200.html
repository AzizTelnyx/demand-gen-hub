<!DOCTYPE html><html><head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @font-face {
    font-family: 'PP Formula';
    font-weight: 800;
    font-style: normal;
    src: local('Inter Black'), local('Inter-Black');
  }

  body {
    width: 1200px;
    height: 1200px;
    background: linear-gradient(135deg, #FAE5FF 0%, #FEFDF5 40%, #F0EEE5 100%);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #000000;
    overflow: hidden;
    position: relative;
  }

  /* Subtle pattern overlay */
  .pattern-overlay {
    position: absolute;
    top: 0;
    right: 0;
    width: 50%;
    height: 100%;
    background: radial-gradient(circle at top right, #E57EFF08 0%, transparent 70%);
    z-index: 0;
  }

  /* Main content */
  .content {
    position: relative;
    z-index: 2;
    display: flex;
    height: 100%;
    padding: 70px;
    padding-bottom: 120px;
    align-items: center;
    gap: 70px;
  }

  .left {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 31px;
  }

  .right {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    display: none;
  }

  /* Product badge */
  .product-badge {
    display: inline-block;
    background: #E57EFF;
    color: #FEFDF5;
    font-size: 11px;
    font-weight: 900;
    padding: 10px 22px;
    border-radius: 24px;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    align-self: flex-start;
    box-shadow: 0 4px 12px #E57EFF30;
  }

  /* Headline - PP Formula Extrabold */
  .headline {
    font-family: 'PP Formula', 'Inter', sans-serif;
    font-size: 38px;
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -2px;
    color: #000000;
    margin-top: 14px;
  }

  /* Description */
  .description {
    font-size: 15px;
    line-height: 1.65;
    color: #666666;
    max-width: 92%;
    font-weight: 500;
  }

  /* CTA Button - ALL CAPS */
  .cta-button {
    display: inline-block;
    background: #E57EFF;
    color: #FEFDF5;
    padding: 18px 36px;
    border-radius: 10px;
    font-family: 'PP Formula', 'Inter', sans-serif;
    font-weight: 900;
    font-size: 15px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin-top: 21px;
    align-self: flex-start;
    box-shadow: 0 6px 24px #E57EFF35;
  }

  /* Product screenshot with pink glow */
  .product-visual {
    max-width: 90%;
    max-height: 720px;
    border-radius: 16px;
    box-shadow: 0 24px 64px #E57EFF20, 0 8px 24px rgba(0,0,0,0.12);
    border: 1px solid #E57EFF15;
  }

  /* Logo - LARGER, better positioned */
  .logo-bottom {
    position: absolute;
    bottom: 60px;
    left: 70px;
    height: 32px;
    opacity: 1;
    z-index: 10;
  }
</style></head><body>
