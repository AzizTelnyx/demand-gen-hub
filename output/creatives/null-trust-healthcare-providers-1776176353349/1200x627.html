<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 627px;
    background: linear-gradient(135deg, #FAE5FF 0%, #FEFDF5 40%, #E6E3D3 100%);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #000000;
    overflow: hidden;
    position: relative;
  }

  /* Subtle accent overlay */
  .accent-overlay {
    position: absolute;
    top: 0;
    right: 0;
    width: 50%;
    height: 100%;
    background: radial-gradient(circle at top right, #E57EFF06 0%, transparent 70%);
    z-index: 0;
  }

  .content {
    position: relative;
    z-index: 2;
    display: flex;
    height: 100%;
    padding: 70px;
    padding-bottom: 130px;
    align-items: center;
    gap: 70px;
  }

  .left {
    flex: 0 0 52%;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  .right {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    
  }

  /* Product badge */
  .product-badge {
    display: inline-block;
    background: #E57EFF;
    color: #FFFFFF;
    font-size: 11px;
    font-weight: 700;
    padding: 8px 20px;
    border-radius: 20px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    align-self: flex-start;
  }

  /* Headline - Inter Bold (700) like real ads */
  .headline {
    font-family: 'Inter', sans-serif;
    font-size: 48px;
    font-weight: 700;
    line-height: 1.15;
    letter-spacing: -0.5px;
    color: #000000;
    margin-top: 10px;
  }

  /* Description */
  .description {
    font-size: 16px;
    line-height: 1.6;
    color: #666666;
    max-width: 90%;
    font-weight: 400;
  }

  /* CTA Button - WHITE with BLACK text like real ads */
  .cta-button {
    display: inline-block;
    background: #FFFFFF;
    color: #000000;
    padding: 16px 40px;
    border-radius: 8px;
    border: 2px solid #000000;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 24px;
    align-self: flex-start;
    min-width: 160px;
    text-align: center;
  }

  /* Product screenshot */
  .product-visual {
    max-width: 88%;
    max-height: 363.65999999999997px;
    border-radius: 12px;
    box-shadow: 0 20px 50px #E57EFF18, 0 8px 20px rgba(0,0,0,0.08);
    border: 1px solid #E57EFF12;
  }

  /* Logo - BIGGER */
  .logo-bottom {
    position: absolute;
    bottom: 62px;
    left: 70px;
    height: 42px;
    opacity: 1;
    z-index: 10;
  }
</style></head><body>
