<!DOCTYPE html><html><head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 627px;
    background: #FEFDF5;
    font-family: 'Inter', sans-serif;
    color: #000000;
    overflow: hidden;
    position: relative;
  }

  .split-container {
    display: flex;
    height: 100%;
    width: 100%;
    flex-direction: row-reverse; /* Image on RIGHT like real ads */
  }

  .image-side {
    flex: 0 0 46%;
    position: relative;
    overflow: hidden;
  }

  .industry-photo {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* Removed white overlay gradient - images should be clean */

  .text-side {
    flex: 1;
    background: linear-gradient(135deg, #FAE5FF 0%, #FEFDF5 100%);
    padding: 70px;
    padding-bottom: 130px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 28px;
  }

  .product-badge {
    display: inline-block;
    background: #E57EFF;
    color: #FFFFFF;
    font-size: 11px;
    font-weight: 700;
    padding: 8px 20px;
    border-radius: 20px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    align-self: flex-start;
  }

  .headline {
    font-family: 'Inter', sans-serif;
    font-size: 44px;
    font-weight: 700;
    line-height: 1.15;
    letter-spacing: -0.5px;
    color: #000000;
  }

  .description {
    font-size: 15px;
    line-height: 1.6;
    color: #666666;
    font-weight: 400;
  }

  .cta-button {
    display: inline-block;
    background: #FFFFFF;
    color: #000000;
    padding: 16px 20px;
    border-radius: 8px;
    border: 2px solid #000000;
    font-family: 'Inter', sans-serif;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    align-self: flex-start;
    text-align: center;
  }

  .logo-bottom {
    position: absolute;
    bottom: 62px;
    left: 70px;
    height: 42px;
    opacity: 1;
    z-index: 10;
  }
</style></head><body>
