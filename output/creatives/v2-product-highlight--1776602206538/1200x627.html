<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;

    color: #000000;
    overflow: hidden;
    position: relative;
  }

  .accent-overlay {
    position: absolute;
    top: 0;
    right: 0;
    width: 50%;
    height: 100%;
    background: radial-gradient(circle at top right, #8850F908 0%, transparent 70%);
  }

  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: row;
    height: 100%;
    padding: 38px;

    gap: 19px;
    align-items: center;
  }

  .text-section {
    flex: 0 0 52%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 11px;
  }

  .image-section {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    
  }

  .product-badge {
    display: inline-block;
    background: #8850F9;
    color: #FFFFFF;
    font-size: 11px;
    font-weight: 700;
    padding: 8px 20px;
    border-radius: 20px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    align-self: flex-start;
  }

  .headline {
    font-size: 48px;
    font-weight: 700;
    line-height: 1.15;
    letter-spacing: -0.5px;
  }

  .description {
    font-size: 16px;
    line-height: 1.6;
    color: #666666;
    max-width: 90%;
  }

  .cta-button {
    display: inline-block;
    background: #FFFFFF;
    color: #000000;
    padding: 12px 24px;
    border-radius: 16px;
    border: 2px solid #000000;
    font-weight: 400;
    font-size: 14px;
    text-transform: uppercase;
    margin-top: 9px;
    align-self: flex-start;
  }

  .product-visual {
    max-width: 88%;
    max-height: 376.2px;
    border-radius: 12px;
    box-shadow: 0 20px 50px #8850F918, 0 8px 20px rgba(0,0,0,0.08);
    border: 1px solid #8850F912;
  }

  .logo {
    position: absolute;
    bottom: 38px;
    left: 38px;
    height: 23px;
  }
</style></head><body>
