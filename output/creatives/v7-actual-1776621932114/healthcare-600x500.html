<!DOCTYPE html><html><head>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 600px;
    height: 500px;
    font-family: 'Inter', -apple-system, sans-serif;
    overflow: hidden;
    position: relative;
    background: #F5F2ED;
  }

  /* Soft gradient overlay on left */
  .gradient-accent {
    position: absolute;
    left: 0;
    top: 0;
    width: 50%;
    height: 100%;
    background: linear-gradient(145deg,
      rgba(0, 200, 170, 0.45) 0%,
      rgba(160, 120, 200, 0.35) 50%,
      rgba(100, 180, 230, 0.25) 100%
    );
    filter: blur(50px);
    z-index: 1;
  }

  /* Industry visual (photo + mockup composite) */
  .visual {
    position: absolute;
    right: -40px;
    bottom: 40px;
    width: 320px;
    height: 320px;
    z-index: 2;
  }
  .visual img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: right bottom;
  }

  /* Content */
  .content {
    position: relative;
    z-index: 3;
    padding: 28px 32px;
    max-width: 65%;
  }

  .headline {
    font-size: 38px;
    font-weight: 700;
    color: #1A1A1A;
    line-height: 1.18;
    margin-bottom: 16px;
    letter-spacing: -0.3px;
  }

  .description {
    font-size: 23px;
    font-weight: 400;
    color: #4A4A4A;
    line-height: 1.4;
    margin-bottom: 24px;
  }

  .cta {
    display: inline-block;
    background: #00C9A7;
    color: #FFFFFF;
    font-size: 21px;
    font-weight: 600;
    padding: 16px 36px;
    border-radius: 40px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  .logo {
    position: absolute;
    bottom: 20px;
    left: 32px;
    height: 28px;
    z-index: 4;
  }
</style></head><body>
