<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>

  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

  body {
    width: 1200px;
    height: 627px;
    background: #0D1117;
    font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #FFFFFF;
    overflow: hidden;
    position: relative;
  }

  .bg-grid {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      radial-gradient(circle at 80% 20%, rgba(0,192,139,0.06) 0%, transparent 50%),
      radial-gradient(circle at 20% 80%, rgba(0,192,139,0.04) 0%, transparent 50%);
    z-index: 0;
  }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: row;
    height: 100%;
    padding: 50px 60px 50px 60px;
    align-items: center;
    gap: 0;
  }

  .left {
    flex: 0 0 540px;
    
  }

  .right {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: center;
    padding-left: 20px;
  }

  .logo {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: #00C08B;
    margin-bottom: 24px;
  }
  .logo span { color: #FFFFFF; }

  .tag {
    
    position: absolute;
    top: 44px;
    right: 54px;
    background: rgba(0,192,139,0.1);
    border: 1px solid rgba(0,192,139,0.25);
    color: #00C08B;
    font-size: 12px;
    font-weight: 600;
    padding: 5px 14px;
    border-radius: 20px;
    letter-spacing: 0.5px;
    z-index: 2;
  }

  .category {
    font-size: 13px;
    font-weight: 600;
    color: #00C08B;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .headline {
    font-size: 46px;
    font-weight: 800;
    line-height: 1.08;
    letter-spacing: -1.5px;
    margin-bottom: 16px;
  }
  .headline em {
    font-style: normal;
    color: #00C08B;
  }

  .sub {
    font-size: 18px;
    color: #8892a6;
    line-height: 1.5;
  }

  .divider {
    
    width: 1px;
    background: rgba(255,255,255,0.06);
    height: 300px;
    flex-shrink: 0;
    margin: 0 24px;
    align-self: center;
  }

  .logo-bottom {
    
    position: absolute;
    bottom: 40px;
    left: 60px;
    z-index: 2;
    font-size: 20px;
    font-weight: 800;
    color: #00C08B;
    letter-spacing: -0.5px;
  }
  

  .trust-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .trust-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 16px;
    text-align: center;
  }

  .trust-card.highlight {
    background: rgba(0,192,139,0.06);
    border-color: rgba(0,192,139,0.15);
  }

  .tc-value {
    font-size: 24px;
    font-weight: 800;
    color: #FFFFFF;
  }

  .tc-value.green { color: #00C08B; }

  .tc-label {
    font-size: 11px;
    color: #5a6478;
    margin-top: 3px;
    line-height: 1.3;
  }

  .badges {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .badge {
    font-size: 11px;
    color: #00C08B;
    background: rgba(0,192,139,0.08);
    border: 1px solid rgba(0,192,139,0.15);
    padding: 4px 10px;
    border-radius: 6px;
    font-weight: 600;
  }
  
  </style>
</head>
<body>
  <div class="bg-grid"></div>

  <div class="tag">NO-CODE + API</div>
  <div class="content">
    <div class="left">
      <div class="category">Full Stack Voice AI</div>
      <div class="headline">Build voice AI<br>agents in<br><em>minutes.</em></div>
      <div class="sub">Import your agents, voice flows,<br>and settings. No rebuilding.<br>Lower latency from day one.</div>
    </div>
    <div class="divider"></div>
    <div class="right">

    <div class="trust-grid">
      
      <div class="trust-card highlight">
        <div class="tc-value green">1</div>
        <div class="tc-label">Platform</div>
      </div>
  

      <div class="trust-card">
        <div class="tc-value">0</div>
        <div class="tc-label">Extra hops</div>
      </div>
  

      <div class="trust-card">
        <div class="tc-value">140+</div>
        <div class="tc-label">Countries served</div>
      </div>
  

      <div class="trust-card highlight">
        <div class="tc-value green">30+</div>
        <div class="tc-label">Global PoPs</div>
      </div>
  
    </div>
    
    <div class="badges">
      <div class="badge">Own network</div>
<div class="badge">Full stack</div>
<div class="badge">One dashboard</div>
<div class="badge">One bill</div>
    </div>
  
  
    </div>
  </div>
  <div class="logo-bottom">telnyx</div>

</body>
</html>
