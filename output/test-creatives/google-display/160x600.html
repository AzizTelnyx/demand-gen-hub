<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>

  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

  body {
    width: 160px;
    height: 600px;
    background: #0D1117;
    font-family: Inter, -apple-system, sans-serif;
    color: white;
    display: flex;
    flex-direction: column;
    padding: 20px 15px;
    overflow: hidden;
  }

  .bg-grid {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: radial-gradient(circle at 50% 20%, rgba(0,192,139,0.08) 0%, transparent 50%);
    z-index: 0;
  }

  .content {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .logo {
    font-size: 14px;
    font-weight: 800;
    color: #00C08B;
    margin-bottom: 15px;
  }

  .headline {
    font-size: 18px;
    font-weight: 800;
    line-height: 1.15;
    margin-bottom: 15px;
  }

  .headline em {
    font-style: normal;
    color: #00C08B;
  }

  .stats {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 10px;
  }

  .stat-item {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 8px;
    padding: 12px;
    text-align: center;
  }

  .stat-value {
    font-size: 20px;
    font-weight: 800;
    color: #00C08B;
  }

  .stat-label {
    font-size: 10px;
    color: #5a6478;
    margin-top: 2px;
  }

  .cta {
    background: #00C08B;
    color: #0D1117;
    font-size: 12px;
    font-weight: 700;
    padding: 10px;
    border-radius: 6px;
    text-align: center;
    margin-top: 15px;
  }
  

  </style>
</head>
<body>
  <div class="bg-grid"></div>

  <div class="bg-grid"></div>
  <div class="content">
    <div class="logo">telnyx</div>
    <div class="headline">Stop stitching.<br><em>Start shipping.</em></div>
    <div class="stats">
      
        <div class="stat-item">
          <div class="stat-value">4 → 1</div>
          <div class="stat-label">Vendors replaced</div>
        </div>
      
        <div class="stat-item">
          <div class="stat-value">1</div>
          <div class="stat-label">Carrier hops</div>
        </div>
      
    </div>
    <div class="cta">Learn More</div>
  </div>
  
</body>
</html>
