<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>

  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

  body {
    width: 728px;
    height: 90px;
    background: #0D1117;
    font-family: Inter, -apple-system, sans-serif;
    color: white;
    display: flex;
    align-items: center;
    padding: 0 20px;
    overflow: hidden;
  }

  .logo {
    font-size: 16px;
    font-weight: 800;
    color: #00C08B;
    margin-right: 20px;
    flex-shrink: 0;
  }

  .headline {
    font-size: 14px;
    font-weight: 700;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .headline em {
    font-style: normal;
    color: #00C08B;
  }

  .stat {
    font-size: 18px;
    font-weight: 800;
    color: #00C08B;
    margin-left: 20px;
    flex-shrink: 0;
  }

  .cta {
    background: #00C08B;
    color: #0D1117;
    font-size: 11px;
    font-weight: 700;
    padding: 6px 12px;
    border-radius: 4px;
    margin-left: 15px;
    flex-shrink: 0;
  }
  

  </style>
</head>
<body>
  <div class="bg-grid"></div>

  <div class="logo">telnyx</div>
  <div class="headline">One platform. <em>Not five vendors.</em></div>
  <div class="stat">4 → 1</div>
  <div class="cta">Learn More</div>
  
</body>
</html>
